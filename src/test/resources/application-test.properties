# Test DataSource (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.sql.init.mode=never

# JWT test values
app.jwt.secret=dGVzdFNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvblRoYXRJc0xvbmdFbm91Z2gxMjM0NTY3ODkw
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Mail mock — disabled for tests, no real SMTP
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=test@test.com
app.frontend.url=http://localhost:5173

# FIX: poolSize must be >= 1 (0 caused IllegalArgumentException in scheduler)
spring.task.scheduling.pool.size=1

# Suppress scheduling in tests by using MockBean in E2E test instead
